name: Deploy Free macOS Update

on:
  push:
    tags:
      - 'v*'

# Explicitly grant strict cryptographic read/write access tokens to the runner
permissions:
  contents: write
  pages: write

jobs:
  build_and_release:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Latest Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Packaging Utilities
        run: brew install create-dmg

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "apollo" \
            -derivedDataPath "./build"

      - name: Build Free Production App Bundle
        run: |
          xcodebuild build \
            -scheme "apollo" \
            -configuration Release \
            -derivedDataPath "./build" \
            -clonedSourcePackagesDirPath "./build/SourcePackages" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

      - name: Package Application into Stylized DMG
        run: |
          # 1. Setup clean isolated staging tree environments
          mkdir -p ./dist ./dmg_staging
          cp -R ./build/Build/Products/Release/Apollo.app ./dmg_staging/
          
          # 2. Deeply sign internal app layers using local ad-hoc criteria
          echo "Resigning embedded Sparkle framework inside staging..."
          codesign --force --deep --sign - ./dmg_staging/Apollo.app/Contents/Frameworks/Sparkle.framework
          
          echo "Resigning main binary bundle container..."
          codesign --force --deep --sign - ./dmg_staging/Apollo.app
          
          # 3. Create public dmg target distribution asset
          create-dmg \
            --volname "Apollo Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Apollo.app" 150 185 \
            --app-drop-link 450 185 \
            ./dist/Apollo-${{ github.ref_name }}.dmg \
            ./dmg_staging/
            
          rm -rf ./dmg_staging

      - name: Download and Run Sparkle Appcast Generator
        env:
          PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Download and unpack official pre-compiled native macOS utility binaries
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.9.2/Sparkle-2.9.2.tar.xz -o Sparkle-Tools.tar.xz
          tar -xf Sparkle-Tools.tar.xz
          
          # PROTOCOL FIX: Feed the raw token via stdin, pointing directly to the flat container folder without a trailing slash
          echo "$PRIVATE_KEY" | ./bin/generate_appcast --ed-key-file - ./dist

      # Create a formal GitHub Release and attach the built .dmg
      - name: Create Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/Apollo-${{ github.ref_name }}.dmg
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deploy the flat appcast xml asset mappings directly to the branch root
      - name: Deploy Updated Files to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./dist
          branch: gh-pages
          clean: true
